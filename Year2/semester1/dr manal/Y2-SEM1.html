<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Semester 1 – Dr. Manal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #071426;
      --surface: rgba(11, 31, 58, 0.65);
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: rgba(148, 163, 184, 0.18);
      --primary: #3b82f6;
      --primary-2: #06b6d4;
      --accent-glow: rgba(59, 130, 246, 0.25);
      --radius: 20px;
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    [data-theme="light"] {
      --bg: #f8fafc;
      --surface: rgba(255,255,255,0.75);
      --text: #0f172a;
      --muted: #64748b;
      --border: rgba(15,23,42,0.12);
      --primary: #2563eb;
      --primary-2: #0891b2;
      --accent-glow: rgba(37,99,235,0.18);
      --shadow: 0 16px 50px rgba(0,0,0,0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      background-image: 
        radial-gradient(circle at 15% 20%, rgba(59,130,246,0.14), transparent 40%),
        radial-gradient(circle at 85% 15%, rgba(6,182,212,0.12), transparent 45%);
      transition: background 0.5s ease;
    }

    .nav {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 1000;
      padding: 1.2rem 5%;
      background: rgba(7,20,38,0.7);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      font-size: 1.35rem;
    }

    .logo img { height: 52px; width: auto; border-radius: 10px; }

    .theme-toggle {
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.6rem 1rem;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    main { padding: 140px 5% 100px; max-width: 1400px; margin: 0 auto; }

    .hero { text-align: center; margin-bottom: 4rem; }

    .hero h1 {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--text), var(--primary-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
